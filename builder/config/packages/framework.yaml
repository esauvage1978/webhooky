# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax
        name: WEBHOOKYSESSID

    # Limiteur pour l’ingress webhook (injecté FormWebhookIngressHandler).
    rate_limiter:
        webhook_ingest:
            policy: sliding_window
            limit: 300
            interval: '1 minute'
        gsc_organization:
            policy: fixed_window
            limit: 2000
            interval: '1 day'

    cache:
        pools:
            cache.gsc_queries:
                adapter: cache.adapter.filesystem
                default_lifetime: 86400

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
